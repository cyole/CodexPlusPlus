name: macOS signed DMG

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build. Leave empty to use the selected branch.
        required: false
        type: string
      version:
        description: Version label for the DMG. Leave empty to derive from the ref or package.json.
        required: false
        type: string

permissions:
  contents: read

jobs:
  signed-dmg:
    name: Signed and notarized macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Import Apple signing assets
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          for name in \
            APPLE_CERTIFICATE_P12_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_API_KEY_P8_BASE64 \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER_ID \
            APPLE_KEYCHAIN_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name secret is not configured"
              exit 1
            fi
          done

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          API_KEY_DIR="$RUNNER_TEMP/private_keys"
          API_KEY_PATH="$API_KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          mkdir -p "$API_KEY_DIR"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$APPLE_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          {
            echo "APPLE_API_KEY_PATH=$API_KEY_PATH"
            echo "APPLE_SIGNING_KEYCHAIN_PATH=$KEYCHAIN_PATH"
          } >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install --package-lock=false

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Resolve version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_REF: ${{ inputs.ref }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$INPUT_VERSION"
          if [[ -z "$VERSION" ]]; then
            REF="${INPUT_REF:-$GITHUB_REF_NAME}"
            CANDIDATE="${REF#refs/tags/}"
            CANDIDATE="${CANDIDATE#v}"
            CANDIDATE="${CANDIDATE#V}"
            if [[ "$CANDIDATE" =~ ^[0-9]+([.][0-9]+){1,3}([-+][0-9A-Za-z.-]+)?$ ]]; then
              VERSION="$CANDIDATE"
            fi
          fi
          if [[ -z "$VERSION" ]]; then
            VERSION="$(node -p "require('./apps/codex-plus-manager/package.json').version")"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Using version: $VERSION"

      - name: Build signed and notarized macOS DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARIZE: "1"
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          DIST="$PWD/dist/macos-signed" \
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" \
          bash scripts/installer/macos/package-dmg-signed.sh "$VERSION" "${{ matrix.arch }}"

      - name: Upload signed DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexPlusPlus-${{ env.VERSION }}-macos-${{ matrix.arch }}-signed
          path: |
            dist/macos-signed/*.dmg
            dist/macos-signed/*.sha256
          if-no-files-found: error

      - name: Delete Apple signing keychain
        if: always()
        shell: bash
        run: |
          if [[ -n "${APPLE_SIGNING_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$APPLE_SIGNING_KEYCHAIN_PATH" || true
          fi
