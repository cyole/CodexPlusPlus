name: macOS signed DMG

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build. Leave empty to use the selected branch.
        required: false
        type: string
      version:
        description: Version label for the DMG. Leave empty to derive from the ref or package.json.
        required: false
        type: string

permissions:
  contents: write

jobs:
  release-meta:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Resolve version and tag
        id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_REF: ${{ inputs.ref }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$INPUT_VERSION"
          VERSION="${VERSION#v}"
          VERSION="${VERSION#V}"
          if [[ -z "$VERSION" ]]; then
            REF="${INPUT_REF:-$GITHUB_REF_NAME}"
            CANDIDATE="${REF#refs/tags/}"
            CANDIDATE="${CANDIDATE#v}"
            CANDIDATE="${CANDIDATE#V}"
            if [[ "$CANDIDATE" =~ ^[0-9]+([.][0-9]+){1,3}([-+][0-9A-Za-z.-]+)?$ ]]; then
              VERSION="$CANDIDATE"
            fi
          fi
          if [[ -z "$VERSION" ]]; then
            VERSION="$(node -p "require('./apps/codex-plus-manager/package.json').version")"
          fi
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"
          echo "Using tag: $TAG"

  signed-dmg:
    name: Signed and notarized macOS DMG (${{ matrix.arch }})
    needs: release-meta
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Import Apple signing assets
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          for name in \
            APPLE_CERTIFICATE_P12_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_API_KEY_P8_BASE64 \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER_ID \
            APPLE_KEYCHAIN_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name secret is not configured"
              exit 1
            fi
          done

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          API_KEY_DIR="$RUNNER_TEMP/private_keys"
          API_KEY_PATH="$API_KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          mkdir -p "$API_KEY_DIR"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$APPLE_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          {
            echo "APPLE_API_KEY_PATH=$API_KEY_PATH"
            echo "APPLE_SIGNING_KEYCHAIN_PATH=$KEYCHAIN_PATH"
          } >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install --package-lock=false

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build signed and notarized macOS DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARIZE: "1"
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          VERSION: ${{ needs.release-meta.outputs.version }}
        run: |
          DIST="$PWD/dist/macos-signed" \
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" \
          bash scripts/installer/macos/package-dmg-signed.sh "$VERSION" "${{ matrix.arch }}"

      - name: Upload signed DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexPlusPlus-${{ needs.release-meta.outputs.version }}-macos-${{ matrix.arch }}-signed
          path: |
            dist/macos-signed/*.dmg
            dist/macos-signed/*.sha256
          if-no-files-found: error

      - name: Delete Apple signing keychain
        if: always()
        shell: bash
        run: |
          if [[ -n "${APPLE_SIGNING_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$APPLE_SIGNING_KEYCHAIN_PATH" || true
          fi

  release:
    name: Create GitHub Release
    needs:
      - release-meta
      - signed-dmg
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Download signed DMG artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: CodexPlusPlus-${{ needs.release-meta.outputs.version }}-macos-*-signed
          path: dist/release-upload
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-meta.outputs.tag }}
          VERSION: ${{ needs.release-meta.outputs.version }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find dist/release-upload -type f \( -name '*.dmg' -o -name '*.sha256' \) | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "::error::No signed DMG files found"
            exit 1
          fi

          target_sha="$(git rev-parse HEAD)"
          printf 'Signed and notarized macOS DMG build for Codex++ %s.\n\nBuilt from: %s\n' \
            "$VERSION" \
            "$target_sha" > release-notes.md

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --clobber --repo "$REPO"
            gh release edit "$TAG" \
              --draft=false \
              --title "Codex++ $TAG" \
              --notes-file release-notes.md \
              --target "$target_sha" \
              --repo "$REPO"
          else
            gh release create "$TAG" "${files[@]}" \
              --title "Codex++ $TAG" \
              --notes-file release-notes.md \
              --target "$target_sha" \
              --repo "$REPO"
          fi
